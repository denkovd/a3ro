# ──────────────────────────────────────────────────────────────
# Module 5 — Bull Market Finder daily scan.
# Runs at 06:20 UTC, after the Vercel ingest cron (06:00) so the
# oil/regime pipelines never contend with the 700-symbol scan.
# The first run doubles as the backfill (no-bars symbols fetch 5y);
# use bull-backfill.yml for a chunked manual first run instead.
#
# Required repo secret: DATABASE_URL (pooled Supabase string).
# ──────────────────────────────────────────────────────────────
name: bull-scan

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: bull-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run scan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: npx tsx scripts/run-bull-scan.ts
