name: Daily Market Watchlist Scan

# Runs once a day. Probe step verifies every symbol in universe.json
# resolves before the scan runs; the scan itself isolates each symbol's
# fetch so one bad ticker never stops the rest of the batch. Target
# runtime is 5-10 min for this 4-symbol watchlist (plenty of headroom —
# scales to ~700 symbols per the P·05 build plan before minutes matter).

on:
  schedule:
    # 06:20 UTC daily
    - cron: "20 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # needed to commit updated cache files back to the repo

concurrency:
  group: daily-market-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet yfinance pandas

      - name: Probe-verify universe
        id: probe
        # Never blocks the scan — a symbol probe failure is logged and
        # flagged, but per-symbol isolation in daily_scan.py means the
        # rest of the watchlist still needs to run today.
        continue-on-error: true
        run: python probe_universe.py --universe universe.json --verbose

      - name: Log probe outcome
        if: steps.probe.outcome == 'failure'
        run: |
          echo "::warning::One or more symbols failed probe verification. Check the 'Probe-verify universe' step log for flagged tickers. Proceeding with the scan — per-symbol isolation means healthy symbols are unaffected."

      - name: Run daily scan
        run: python daily_scan.py --universe universe.json --cache-dir data/bars

      - name: Commit updated cache
        run: |
          git config user.name "daily-scan-bot"
          git config user.email "actions@github.com"
          git add data/bars
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "chore(scan): daily bar cache update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Fail job if probe found flagged symbols
        if: steps.probe.outcome == 'failure'
        run: |
          echo "Marking job as failed to surface the flagged symbols (scan itself still ran and committed any data it could fetch)."
          exit 1
